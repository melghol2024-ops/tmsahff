<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TMSAHFF STORE | النظام الاحترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #050505; color: #fff; }
        .glass { background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(12px); border: 1px solid #333; }
        .modal { display: none; position: fixed; inset: 0; background: #000d; z-index: 50; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-5xl mx-auto">
    <div class="glass p-6 rounded-2xl flex gap-2 mb-8 shadow-2xl border border-neutral-800">
        <input id="userInput" class="flex-1 bg-transparent p-3 outline-none text-white" placeholder="أدخل اليوزر للبحث عن طلباتك...">
        <button onclick="search()" class="bg-pink-600 px-8 rounded-xl font-bold hover:bg-pink-700 transition">بحث</button>
    </div>

    <div class="glass overflow-x-auto rounded-2xl border border-neutral-800">
        <table class="w-full text-right border-collapse">
            <thead>
                <tr class="text-neutral-500 border-b border-neutral-800 text-sm">
                    <th class="p-4">الطلب</th>
                    <th class="p-4">الايدي/النص</th>
                    <th class="p-4">التكلفة</th>
                    <th class="p-4">الحالة</th>
                    <th class="p-4">إجراءات</th>
                </tr>
            </thead>
            <tbody id="results"></tbody>
        </table>
    </div>
</div>

<div id="actionModal" class="modal">
    <div class="glass p-6 rounded-3xl w-96 border border-neutral-800">
        <h2 id="modalTitle" class="text-xl font-bold mb-2"></h2>
        <p id="modalDesc" class="text-sm text-neutral-400 mb-4"></p>
        <textarea id="modalNote" class="hidden w-full h-20 bg-black p-2 rounded-lg border border-neutral-700 outline-none mb-4" placeholder="اكتب التفاصيل هنا..."></textarea>
        <div class="flex gap-2">
            <button onclick="closeModal()" class="flex-1 py-2 bg-neutral-800 rounded-xl hover:bg-neutral-700 transition">إلغاء</button>
            <button id="confirmBtn" class="flex-1 py-2 bg-pink-600 rounded-xl font-bold hover:bg-pink-700 transition">تأكيد الإجراء</button>
        </div>
    </div>
</div>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1521713795477667860/Ma3vk6FfyfXCCdYBLE_EMg679hFg2w8nJR4DKTKTtbdwZjMgs1H6WoKYQgRLMH4nMKi5";

    async function search() {
        const user = document.getElementById('userInput').value.trim();
        const res = document.getElementById('results');
        if (!user) { alert("أدخل اليوزر!"); return; }
        
        res.innerHTML = '<tr><td colspan="5" class="p-4 text-center">جاري البحث...</td></tr>';
        
        try {
            const response = await fetch('data.csv');
            const text = await response.text();
            const rows = text.split(/\r?\n/).slice(1);
            let html = '';

            rows.forEach(row => {
                const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
                if (cols && cols[0].replace(/"/g, '').trim().toLowerCase() === user.toLowerCase()) {
                    const article = cols[1]?.replace(/"/g, '');
                    const message = cols[2]?.replace(/"/g, '');
                    const price = `${cols[3]} ${cols[4]}`;
                    const statusRaw = cols[6]?.trim();
                    const status = statusRaw === 'Delivered' ? '✅ تم التوصيل' : '⏳ قيد الانتظار';

                    html += `
                    <tr class="border-b border-neutral-800">
                        <td class="p-4 font-bold">${article}</td>
                        <td class="p-4 text-sm">${message}</td>
                        <td class="p-4">${price}</td>
                        <td class="p-4 ${statusRaw === 'Delivered' ? 'text-green-500' : 'text-yellow-500'}">${status}</td>
                        <td class="p-4 flex gap-2">
                            ${statusRaw === 'Pending' ? `
                                <button onclick="openModal('استعجال', '${article}')" class="bg-blue-900 px-3 py-1 rounded text-xs hover:bg-blue-800">استعجال</button>
                                <button onclick="openModal('تعديل', '${article}')" class="bg-yellow-700 px-3 py-1 rounded text-xs hover:bg-yellow-600">تعديل</button>
                                <button onclick="openModal('إلغاء', '${article}')" class="bg-red-900 px-3 py-1 rounded text-xs hover:bg-red-800">إلغاء</button>
                            ` : `<button onclick="sendToDiscord('تقييم', '${article}', 'تم تقييم الطلب')" class="bg-purple-900 px-3 py-1 rounded text-xs hover:bg-purple-800">⭐ تقييم</button>`}
                        </td>
                    </tr>`;
                }
            });
            res.innerHTML = html || '<tr><td colspan="5" class="p-4 text-center text-red-500">لا توجد طلبات لهذا اليوزر.</td></tr>';
        } catch (e) { res.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-red-500">تأكد من فتح الملف عبر Live Server!</td></tr>'; }
    }

    function openModal(type, order) {
        document.getElementById('modalTitle').innerText = 'تأكيد: ' + type;
        const noteArea = document.getElementById('modalNote');
        const desc = document.getElementById('modalDesc');
        
        noteArea.classList.add('hidden');
        if (type === 'إلغاء') desc.innerText = "هل تود الإلغاء وارجاع نقاطك؟";
        else if (type === 'تعديل') {
            desc.innerText = "اكتب سبب التعديل والتفاصيل الجديدة:";
            noteArea.classList.remove('hidden');
        } else desc.innerText = "تأكيد طلب " + type + "؟";
        
        document.getElementById('actionModal').style.display = 'flex';
        document.getElementById('confirmBtn').onclick = () => sendToDiscord(type, order, noteArea.value);
    }

    async function sendToDiscord(type, order, note) {
        const payload = { embeds: [{ title: `🔔 إجراء: ${type}`, fields: [{ name: "الطلب", value: order }, { name: "الرسالة", value: note || "لا يوجد" }] }] };
        await fetch(WEBHOOK, { method: 'POST', body: JSON.stringify(payload), headers: {'Content-Type': 'application/json'} });
        alert("تم إرسال " + type + " بنجاح!");
        closeModal();
    }

    function closeModal() { document.getElementById('actionModal').style.display = 'none'; }
</script>
</body>
</html>

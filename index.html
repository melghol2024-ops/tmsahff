<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TMSAHFF - تتبع الطلبات</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid #333; }
        input { width: 70%; padding: 15px; border-radius: 10px; border: none; font-size: 16px; margin-bottom: 10px; }
        button { padding: 15px 30px; background: #e91e63; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; }
        table { width: 100%; margin-top: 25px; border-collapse: collapse; }
        th { background: #333; padding: 12px; }
        td { padding: 12px; border: 1px solid #333; text-align: center; }
        .Pending { color: #ffeb3b; font-weight: bold; }
        .Delivered { color: #4caf50; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 استعلام عن طلبات TMSAHFF</h1>
        <input type="text" id="userInput" placeholder="اكتب اليوزر...">
        <button onclick="search()">عرض طلباتي</button>
        <div id="results"></div>
    </div>

    <script>
        async function search() {
            const user = document.getElementById('userInput').value.trim().toLowerCase();
            const resDiv = document.getElementById('results');
            const response = await fetch('data.csv');
            const text = await response.text();
            const rows = text.split('\n');
            let html = '<table><tr><th>الطلب</th><th>الأيدي / الرسالة</th><th>الحالة</th></tr>';
            let found = false;

            for(let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(',');
                if(cols[0] && cols[0].trim().toLowerCase() === user) {
                    let statusClass = cols[6] ? cols[6].trim() : 'Pending';
                    let statusText = statusClass === 'Delivered' ? '✅ تم الشحن' : '⏳ قيد الانتظار';
                    html += `<tr><td>${cols[1]}</td><td>${cols[2] || '-'}</td><td class="${statusClass}">${statusText}</td></tr>`;
                    found = true;
                }
            }
            resDiv.innerHTML = found ? html + '</table>' : "❌ لا توجد طلبات لهذا اليوزر.";
        }
    </script>
</body>
</html>
